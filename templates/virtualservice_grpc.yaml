{{- if .Values.istio.virtualserviceGrpc.enabled }}
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: {{ .Release.Name }}-grpc
spec:
  hosts:
  - {{ template "grpcHostUrl" . }}
  gateways: 
  - {{ .Values.global.gateway }}
  http:
{{ toYaml .Values.istio.virtualserviceGrpc.http | indent 2 }}
{{- end -}}