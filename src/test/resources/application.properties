#server.port=8091
audit-trail.audit-trail-entity-name=audit-trail:document
#Data store driver configuration
audit-trail.driver-name=InternalText
audit-trail.url=http://localhost:9300/

spring.rabbitmq.host=localhost

# Disable RabbitMQ auto-configuration for tests
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration

# Disable stale download scheduler for tests
audit.stale.download.enabled=false

# Disable audit history cleanup for tests
audit.clean.audit.history.enabled=false