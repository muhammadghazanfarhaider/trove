#ping schema
service.commit.no=${SERVICE_COMMIT_NO:06.04.26}
info.app.name=Audit Trail Service

#server.port=8091
audit-trail.audit-trail-entity-name=${DATA_STORE_ENTITY_NAME:audit-trail}
#Data store driver configuration
audit-trail.driver-name=${DATA_STORE_DRIVER:InternalText}
audit-trail.url=${DATA_STORE_DRIVER_URL}

spring.rabbitmq.host=${RMQ_HOST}

installation.name=${INSTALLATION_NAME:}


# actuator
info.app.description=AuditTrail
info.app.version=27.03.26
management.endpoint.beans.enabled=true
management.endpoints.web.base-path=/audit/manage
management.endpoints.web.exposure.include=*

audit.date.fields=${AUDIT_DATE_FIELDS:expiryDate,ppdmCatalogueDate,creditCheckDate,issueDate,rowExpiryDate,abandonmentDate,completionDate,spudDate,requestDate,dueDate,completeDate,finalBillingDate,deliveryDate,effectiveDate,rowChangedDate,rowCreatedDate,createdDate,changedDate,usedCapacityDate,confidentialReleaseDate,catalogueDate,createDate,startDate,endDate,rowEffectiveDate,originDate,statusDate,finalDrillDate,wellboreCompletionDate,wellboreSpudDate,surveyEndDate,surveyStartDate,licenseDate}
audit.date.format.target=${AUDIT_DATE_FORMAT_TARGET:yyyy-MM-dd}
spring.main.allow-bean-definition-overriding=true

# cron job to run at 12:00:00pm, the last Sunday of the every month
# sample expression 0 0 12 ? * 1L *
es.cron.param=${ES_CRON:-}
es.audit.doc.threshold=${ES_AUDIT_DOC_THRESHOLD:500}
es.audit.mm-dd=${ES_MMDD:1Y}

# Audit history cleanup configuration
# Enable/disable the audit history cleanup bean (disabled by default)
# When false or not set, the ClearAuditHistory bean is NOT created (no memory/CPU overhead)
# When true, the bean is created and can clean old audit records based on threshold
# Note: This is separate from the scheduled cleanup - this controls bean creation only
audit.clean.audit.history.enabled=${AUDIT_CLEAN_HISTORY_ENABLED:false}

# Stale download cleanup scheduler configuration
# Enable/disable the stale download cleanup scheduler (bean-level control)
# When false, the FailStaleDownloadsScheduler bean is NOT created (no memory/CPU overhead)
# When true or not set, the scheduler bean is created and runs periodically
audit.stale.download.enabled=${AUDIT_STALE_DOWNLOAD_ENABLED:false}

# Elasticsearch index name for file manager audit records
# This is the specific index where download audit records are stored
audit.stale.download.index.name=${AUDIT_STALE_DOWNLOAD_INDEX_NAME:audit_file_manager}

# Cron expression: Run every minute by default (0 * * * * ? = at 0 seconds of every minute)
# Format: second minute hour day month weekday
# Examples:
#   0 * * * * ?     = every minute
#   0 */5 * * * ?   = every 5 minutes
#   0 0 * * * ?     = every hour
audit.stale.download.cron=${AUDIT_STALE_DOWNLOAD_CRON:0 0 * * * ?}
# Threshold in minutes: Records older than this will be marked as DOWNLOAD_FAILED
audit.stale.download.threshold.minutes=${AUDIT_STALE_DOWNLOAD_THRESHOLD_MINUTES:1}

# Stale session cleanup scheduler configuration
# Enable/disable the stale session cleanup scheduler (disabled by default)
# When false or not set, the StaleSessionCleanupScheduler bean is NOT created
# When true, the scheduler runs periodically to close stale active sessions
audit.stale.session.enabled=${AUDIT_STALE_SESSION_ENABLED:false}

# Threshold: Sessions active longer than this will be marked as closed
# Format: <number>H (hours) or <number>M (minutes)
# Examples: 8H (8 hours), 10M (10 minutes), 24H (24 hours), 30M (30 minutes)
# Default: 8H - sessions active beyond this duration will be auto-closed
audit.stale.session.threshold=${AUDIT_STALE_SESSION_THRESHOLD:8H}

# Cron expression: Run every hour by default (0 0 * * * ? = at 0 minutes of every hour)
# Format: second minute hour day month weekday
# Examples:
#   0 0 * * * ?     = every hour
#   0 0 */2 * * ?   = every 2 hours
#   0 0 0 * * ?     = every day at midnight
audit.stale.session.cron=${AUDIT_STALE_SESSION_CRON:0 0 * * * ?}

# Elasticsearch index name for user session audit records
audit.stale.session.index.name=${AUDIT_STALE_SESSION_INDEX_NAME:audit_user_session}

# Configure logging
logging.level.org.springframework.web=ERROR
#logging.level.org.springframework.orm.jpa=ERROR
logging.level.com.target=${LOGGING_LEVEL:INFO}
logging.file.path=${java.io.tmpdir}/audit-trail.log
logging.pattern.console=%clr(%d{yyyy-MM-dd HH:mm:ss.SSS}){blue} %clr(%-5p) %clr(%logger{39}.%M):%L{blue} %clr(:){faint} %m%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
server.http2.enabled=true
