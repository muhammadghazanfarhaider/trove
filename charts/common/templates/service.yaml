---
{{ if .Values.service }}
apiVersion: v1
kind: Service
metadata:
  name: {{ template "APP.name" . }}
  labels:
    app: {{ template "APP.name" . }}
    release: {{ .Release.Name }}
    heritage: {{ .Release.Service }}
spec:
  type: {{ .Values.service.type }}
  ports:
{{ toYaml .Values.service.ports | indent 2 }}
  selector:
    app: {{ template "APP.name" . }}
    # release: {{ .Release.Name }}
{{- end }}
---
{{ if eq .Values.kind "StatefulSet"}}
apiVersion: v1
kind: Service
metadata:
  name: {{ template "APP.name" . }}-headless
  labels:
    app: {{ template "APP.name" . }}
    release: {{ .Release.Name }}
    heritage: {{ .Release.Service }}
spec:
  clusterIP: None
  type: {{ .Values.service.type }}
  ports:
{{ toYaml .Values.service.ports | indent 2 }}
  selector:
    app: {{ template "APP.name" . }}
{{- end}}