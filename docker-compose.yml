version: "3.4"
networks:
    backend:
services:
  rabbitmq:
    image: rabbitmq:management
    container_name: rabbitmq1
    hostname: rabbitmq
    ports:
      - 5672:5672
      - 15672:15672  
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:6.3.2
    container_name: elasticsearch1
    hostname: elasticsearch
    environment:
      - cluster.name=docker-cluster
      - cluster-nodes =localhost:9300
      - bootstrap.memory_lock=true
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - ${DOCKERDATA}/ELASTIC_SEARCH:/usr/share/elasticsearch/data
    ports:
      - 9200:9200
      - 9300:9300
  audit-trail-service:
        image: meera/audit-trail-service
        container_name: audit-trail-service
        hostname: audit-trail-service
        ports:
          - 8091:8080
          - 6565:6565
        networks:
          - backend
        environment:
          RMQ_HOST: localhost
          DATA_STORE_ENTITY_NAME: audit-trail:document
          DATA_STORE_DRIVER: InternalText
          DATA_STORE_DRIVER_URL: http://localhost:9200/
        depends_on:
          - elasticsearch
          - rabbitmq